name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate PowerShell scripts
        shell: pwsh
        run: |
          $files = @('Optimize.ps1', 'OptimizeGUI.ps1', 'Build-EXE.ps1')
          foreach ($f in $files) {
            if (Test-Path $f) {
              $errors = $null
              $null = [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $f), [ref]$null, [ref]$errors)
              if ($errors.Count -gt 0) {
                Write-Warning "$f has $($errors.Count) parse error(s)"
              } else {
                Write-Host "✓ $f: valid syntax"
              }
            }
          }

      - name: Check config
        shell: pwsh
        run: |
          if (Test-Path 'config/optimization.json') {
            $json = Get-Content 'config/optimization.json' -Raw | ConvertFrom-Json
            Write-Host "✓ config/optimization.json: valid"
          }

      - name: Check release-facing files have no BOM (prevent release mojibake)
        shell: pwsh
        run: |
          $files = @(
            'README.md',
            'config/optimization.json',
            'Optimize.ps1',
            'OptimizeGUI.ps1',
            'Build-EXE.ps1',
            'Launcher.cs',
            'tools/README.md',
            'tools/remove-internal-tool/README.md'
          )
          $bad = @()
          foreach ($f in $files) {
            if (-not (Test-Path $f)) { continue }
            $b = [System.IO.File]::ReadAllBytes($f)
            $hasBom = ($b.Count -ge 3 -and $b[0] -eq 0xEF -and $b[1] -eq 0xBB -and $b[2] -eq 0xBF)
            if ($hasBom) { $bad += $f } else { Write-Host "OK: $f has no BOM" }
          }
          if ($bad.Count -gt 0) {
            Write-Error "These release-facing files must NOT have a UTF-8 BOM (it causes GitHub mojibake on the Release page): $($bad -join ', ')"
            exit 1
          }
          Write-Host "All checked files are BOM-free."

      - name: Check README
        shell: pwsh
        run: Test-Path README.md
