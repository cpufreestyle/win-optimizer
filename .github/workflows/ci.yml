name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate PowerShell scripts
        shell: pwsh
        run: |
          $files = @('Optimize.ps1', 'OptimizeGUI.ps1', 'Build-EXE.ps1')
          foreach ($f in $files) {
            if (Test-Path $f) {
              $errors = $null
              $null = [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $f), [ref]$null, [ref]$errors)
              if ($errors.Count -gt 0) {
                Write-Warning "$f has $($errors.Count) parse error(s)"
              } else {
                Write-Host "✓ $f: valid syntax"
              }
            }
          }

      - name: Check config
        shell: pwsh
        run: |
          if (Test-Path 'config/optimization.json') {
            $json = Get-Content 'config/optimization.json' -Raw | ConvertFrom-Json
            Write-Host "✓ config/optimization.json: valid"
          }

      - name: Check README has no BOM (prevent release mojibake)
        shell: pwsh
        run: |
          $b = [System.IO.File]::ReadAllBytes('README.md')
          if ($b.Count -ge 3 -and $b[0] -eq 0xEF -and $b[1] -eq 0xBB -and $b[2] -eq 0xBF) {
            Write-Error "README.md must NOT have a UTF-8 BOM (it causes GitHub mojibake on the Release page)."
            exit 1
          } else {
            Write-Host "OK: README.md has no BOM"
          }

      - name: Check README
        shell: pwsh
        run: Test-Path README.md
